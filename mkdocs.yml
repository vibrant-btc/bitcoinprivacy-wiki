site_name: BitcoinPrivacy.Wiki
site_description: A collection of in-depth learning resources about Bitcoin privacy
site_url: https://bitcoinprivacy.wiki
repo_url: https://github.com/vibrant-btc/bitcoinprivacy-wiki
repo_name: bitcoinprivacy-wiki
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  icon:
    logo: simple/bitcoin
    repo: fontawesome/brands/github
  features:
    - content.action.edit
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
plugins:
  - search
  - privacy:
      assets: false
      links_attr_map:
        target: _blank
  - tags
  - social:
      cards_layout_dir: layouts
      cards_layout: bitcoin
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      zoomable: true
      draggable: true
      auto_caption: true
      caption_position: bottom
      background: none
      shadow: false
extra_javascript:
  - js/popup.js
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
extra:
  generator: false
nav:
  - Home:
    - index.md
  - Getting Started:
    - What is Bitcoin Privacy?: getting-started/what-is-privacy.md
    - Threat Modeling: getting-started/threat-modeling.md
    - Understanding UTXOs: getting-started/utxos.md
    - How Chain Analysis Works: getting-started/chain-analysis.md
    - Privacy Heuristics Explained: getting-started/heuristics.md
    - Acquiring Bitcoin Privately: getting-started/acquiring.md
    - Choosing a Wallet: getting-started/wallets.md
    - Running Your Own Node: getting-started/node.md
    - Your First Steps: getting-started/first-steps.md
    - Recovering from Privacy Mistakes: getting-started/recovering-from-privacy-mistakes.md
    - Your Privacy Checklist: getting-started/checklist.md
  - Privacy Techniques:
    - Which Privacy Tool Should I Use?: techniques/decision-tree.md
    - Public Receiving: techniques/public-receiving.md
    - Address Reuse:
      - techniques/address-reuse/index.md
      - techniques/coin-control.md
      - techniques/address-reuse/bip47.md
      - techniques/address-reuse/silent-payments.md
      - techniques/comparison.md
    - CoinJoin:
      - techniques/coinjoin/index.md
      - Implementations:
        - techniques/coinjoin/whirlpool.md
        - techniques/coinjoin/joinmarket.md
        - techniques/coinjoin/wasabi.md
      - Post Mix Spending:
        - techniques/post-mix.md
        - techniques/payjoin.md
        - techniques/stonewall.md
        - techniques/ricochet.md
  - Lightning Privacy:
    - Lightning Basics: lightning/basics.md
    - Lightning Privacy: lightning/privacy.md
    - Routing Analysis: lightning/routing-analysis.md
    - Blinded Paths: lightning/blinded-paths.md
    - BOLT12 Offers: lightning/bolt12.md
    - lnproxy: lightning/lnproxy.md
  - Boltzmann Entropy:
    - boltzmann/index.md
    - What Is Entropy?: boltzmann/what-is-entropy.md
    - Valid Interpretations: boltzmann/valid-interpretations.md
    - Link Probability Matrix: boltzmann/link-probability-matrix.md
    - Privacy Analysis Walkthrough:
      - analysis/index.md
      - Examples:
        - analysis/batch-payment.md
        - analysis/consolidation.md
        - analysis/stonewall.md
        - analysis/whirlpool.md
        - analysis/ricochet.md
  - Resources:
    - links/index.md
    - Bitcoin Fungibility: links/fungibility.md
  - Glossary:
    - Glossary: glossary.md
  - Donate:
    - donate/index.md

