size: { width: 1200, height: 630 }
layers:
  - background:
      color: "#000000"
  - size: { width: 154, height: 154 }
    offset: { x: 984, y: 40 }
    icon:
      value: simple/bitcoin
      color: "#ffffff"
  - size: { width: 400, height: 50 }
    offset: { x: 62, y: 60 }
    typography:
      content: "{% if not page.is_homepage %}BitcoinPrivacy.Wiki{% endif %}"
      align: start
      color: "#ffffff"
      line:
        amount: 1
        height: 1.25
      font:
        family: Roboto
        style: Medium
  - size: { width: 900, height: 300 }
    offset: { x: 62, y: 160 }
    typography:
      content: "{% if page.is_homepage %}BitcoinPrivacy.Wiki{% else %}{{ page.title }}{% endif %}"
      align: start
      color: "#ffffff"
      overflow: shrink
      line:
        amount: 3
        height: 1.25
      font:
        family: Roboto
        style: Bold
  - size: { width: 900, height: 120 }
    offset: { x: 62, y: 420 }
    typography:
      content: "{{ page.meta.get('description', config.site_description) }}"
      align: start
      color: "#888888"
      overflow: shrink
      line:
        amount: 3
        height: 1.4
      font:
        family: Roboto
        style: Regular

definitions:
  - &page_title_with_site_name >-
    {%- if not page.is_homepage -%}
      {{ page.meta.get("title", page.title) }} - {{ config.site_name }}
    {%- else -%}
      {{ page.meta.get("title", page.title) }}
    {%- endif -%}

  - &page_description >-
    {{ page.meta.get("description", config.site_description) or "" }}

tags:
  og:type: website
  og:title: *page_title_with_site_name
  og:description: *page_description
  og:image: "{{ image.url }}"
  og:image:type: "{{ image.type }}"
  og:image:width: "{{ image.width }}"
  og:image:height: "{{ image.height }}"
  og:url: "{{ page.canonical_url }}"

  twitter:card: summary_large_image
  twitter:title: *page_title_with_site_name
  twitter:description: *page_description
  twitter:image: "{{ image.url }}"
